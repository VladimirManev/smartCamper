; Module-6: Victron BLE energy monitor (WiFi + BLE, no GPIO)
; BLE + WiFi exceed the default 1 MB app partition (~1.5 MB firmware)
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = huge_app.csv

; Libraries
lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.3
; WiFi is built into ESP32 Arduino framework, no need to add it

; Compilation settings
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -Os

; Serial port settings
monitor_speed = 115200
monitor_filters = 
    time
    default

; Upload settings
upload_speed = 921600
